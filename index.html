if (!window.__FIREBASE_READY__) {

// ─── DESIGN TOKENS ────────────────────────────────────────────────────────
const G = {
  gold: "#C9A84C", goldL: "#E8C97A", goldD: "#8B6914",
  black: "#0a0a0a", b2: "#111", b3: "#1a1a1a", b4: "#222", b5: "#2a2a2a",
  white: "#fff", dim: "rgba(255,255,255,0.55)",
  glow: "rgba(201,168,76,0.13)", border: "rgba(201,168,76,0.18)",
  green: "#4ade80", red: "#ef4444",
};

// ─── FIREBASE HELPERS ─────────────────────────────────────────────────────
const { auth, db, FieldValue } = window.__fb;

const api = {
  // Auth
  signUp: async (email, password, name, role) => {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    const avatar = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    // Find the coach if this is a client
    let coachId = null;
    if (role === "client") {
      const coaches = await db.collection("users").where("role", "==", "coach").limit(1).get();
      if (!coaches.empty) coachId = coaches.docs[0].id;
    }
    await db.collection("users").doc(cred.user.uid).set({
      email, name, role, avatar, coachId,
      streak: 0, plan: role === "coach" ? "OWNER" : "STANDARD",
      createdAt: FieldValue.serverTimestamp(),
    });
    // If client joining, set default nutrition targets
    if (role === "client") {
      await db.collection("nutritionTargets").doc(cred.user.uid).set({
        calories: 2200, protein: 170, carbs: 250, fat: 70,
      });
    }
    return cred.user.uid;
  },
  signIn: (email, password) => auth.signInWithEmailAndPassword(email, password),
  signOut: () => auth.signOut(),
  getUser: async (uid) => {
    const doc = await db.collection("users").doc(uid).get();
    return doc.exists ? { id: doc.id, ...doc.data() } : null;
  },

  // Clients
  getClients: async (coachId) => {
    const snap = await db.collection("users").where("coachId", "==", coachId).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  watchClients: (coachId, cb) => {
    return db.collection("users").where("coachId", "==", coachId)
      .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  },

  // Programmes
  getProgrammes: async (coachId) => {
    const snap = await db.collection("programmes").where("coachId", "==", coachId).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  watchProgrammes: (coachId, cb) => {
    return db.collection("programmes").where("coachId", "==", coachId)
      .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  },
  getClientProgrammes: async (clientId) => {
    const snap = await db.collection("programmes")
      .where("assignedTo", "array-contains", clientId).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  createProgramme: async (data) => {
    const ref = await db.collection("programmes").add({
      ...data, assignedTo: [], createdAt: FieldValue.serverTimestamp(),
    });
    return ref.id;
  },
  updateProgramme: (progId, data) => db.collection("programmes").doc(progId).update(data),
  assignProgramme: (progId, clientId) =>
    db.collection("programmes").doc(progId).update({
      assignedTo: FieldValue.arrayUnion(clientId),
    }),
  unassignProgramme: (progId, clientId) =>
    db.collection("programmes").doc(progId).update({
      assignedTo: FieldValue.arrayRemove(clientId),
    }),

  // Sessions
  getSessions: async (clientId) => {
    const snap = await db.collection("sessions").where("clientId", "==", clientId).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  watchSessions: (clientId, cb) => {
    return db.collection("sessions").where("clientId", "==", clientId)
      .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  },
  logSession: (data) => db.collection("sessions").add({
    ...data, completedAt: FieldValue.serverTimestamp(),
  }),

  // Messages
  watchConversation: (userA, userB, cb) => {
    return db.collection("messages")
      .where("participants", "array-contains", userA)
      .orderBy("createdAt", "asc")
      .onSnapshot(snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
          .filter(m => m.participants.includes(userB));
        cb(msgs);
      });
  },
  sendMessage: (from, to, text) => db.collection("messages").add({
    from, to, text, participants: [from, to].sort(),
    createdAt: FieldValue.serverTimestamp(),
  }),

  // Nutrition
  getNutritionTargets: async (clientId) => {
    const doc = await db.collection("nutritionTargets").doc(clientId).get();
    return doc.exists ? doc.data() : { calories: 2200, protein: 170, carbs: 250, fat: 70 };
  },
  setNutritionTargets: (clientId, targets) =>
    db.collection("nutritionTargets").doc(clientId).set(targets),
  getTodayMeals: async (clientId) => {
    const today = new Date().toISOString().split("T")[0];
    const snap = await db.collection("meals")
      .where("clientId", "==", clientId).where("date", "==", today).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  watchTodayMeals: (clientId, cb) => {
    const today = new Date().toISOString().split("T")[0];
    return db.collection("meals")
      .where("clientId", "==", clientId).where("date", "==", today)
      .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  },
  addMeal: (data) => db.collection("meals").add({
    ...data, createdAt: FieldValue.serverTimestamp(),
  }),
  deleteMeal: (mealId) => db.collection("meals").doc(mealId).delete(),

  // Progress / measurements
  getMeasurements: async (clientId) => {
    const snap = await db.collection("measurements")
      .where("clientId", "==", clientId).orderBy("date", "asc").get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  addMeasurement: (data) => db.collection("measurements").add(data),
};

// ─── SHARED UI ────────────────────────────────────────────────────────────
const Logo = ({ size = 32 }) => (
  <span style={{ fontFamily: "'Bebas Neue'", fontSize: size, letterSpacing: 5,
    background: `linear-gradient(135deg, ${G.goldD}, ${G.goldL}, ${G.gold})`,
    WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>LEVELUP</span>
);

const GoldBtn = ({ children, onClick, style = {}, sm = false, disabled }) => (
  <button onClick={onClick} disabled={disabled} style={{
    background: disabled ? G.b4 : `linear-gradient(135deg, ${G.goldD}, ${G.gold})`,
    color: disabled ? G.dim : G.black, fontWeight: 800, letterSpacing: 1.5,
    fontSize: sm ? 11 : 13, padding: sm ? "10px 18px" : "14px 28px",
    borderRadius: 10, textTransform: "uppercase",
    boxShadow: disabled ? "none" : `0 4px 24px rgba(201,168,76,.3)`,
    transition: "all .2s", opacity: disabled ? 0.5 : 1, ...style
  }}>{children}</button>
);

const OutlineBtn = ({ children, onClick, style = {} }) => (
  <button onClick={onClick} style={{
    border: `1px solid ${G.border}`, color: G.gold,
    fontWeight: 700, fontSize: 12, padding: "11px 20px",
    borderRadius: 10, letterSpacing: 1, textTransform: "uppercase",
    background: "transparent", ...style
  }}>{children}</button>
);

const Card = ({ children, style = {}, onClick }) => (
  <div onClick={onClick} style={{
    background: G.b3, border: `1px solid ${G.b5}`, borderRadius: 14, padding: 16,
    cursor: onClick ? "pointer" : "default", ...style
  }}>{children}</div>
);

const Input = ({ label, type = "text", value, onChange, placeholder }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: G.dim, marginBottom: 6, fontWeight: 700 }}>{label}</div>}
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", background: G.b4, border: `1px solid ${G.b5}`, borderRadius: 10,
        padding: "13px 16px", fontSize: 14, color: G.white }} />
  </div>
);

const SectionTitle = ({ children, action, onAction }) => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
    padding: "18px 20px 10px", fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 2 }}>
    <span>{children}</span>
    {action && <button onClick={onAction} style={{ fontFamily: "'Barlow'", fontSize: 11,
      letterSpacing: 1, color: G.gold, textTransform: "uppercase", fontWeight: 700 }}>{action}</button>}
  </div>
);

const Badge = ({ children, color = G.gold }) => (
  <span style={{ padding: "3px 10px", borderRadius: 20, fontSize: 9, fontWeight: 800,
    letterSpacing: 1.5, textTransform: "uppercase",
    background: `${color}18`, border: `1px solid ${color}40`, color }}>{children}</span>
);

const Avatar = ({ initials, size = 38, gold = true }) => (
  <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0,
    background: gold ? `linear-gradient(135deg, ${G.goldD}, ${G.gold})` : G.b4,
    display: "flex", alignItems: "center", justifyContent: "center",
    fontWeight: 800, fontSize: size * 0.36, color: gold ? G.black : G.white,
    border: `2px solid ${gold ? G.gold : G.b5}` }}>{initials}</div>
);

const Loading = () => (
  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: 60 }}>
    <div className="spinner" />
  </div>
);

const EmptyState = ({ icon, title, desc }) => (
  <div style={{ padding: 40, textAlign: "center", color: G.dim }}>
    <div style={{ fontSize: 40, marginBottom: 12 }}>{icon}</div>
    <div style={{ fontWeight: 700, color: G.white }}>{title}</div>
    <div style={{ fontSize: 12, marginTop: 6 }}>{desc}</div>
  </div>
);

const MacroBar = ({ label, current, target, color }) => {
  const pct = target ? Math.min(100, Math.round((current / target) * 100)) : 0;
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, marginBottom: 5 }}>
        <span>{label}</span>
        <span style={{ color: G.gold }}>{current}g / {target}g</span>
      </div>
      <div style={{ height: 6, background: G.b5, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", borderRadius: 3,
          background: `linear-gradient(90deg, ${color}88, ${color})`, transition: "width 1s ease" }} />
      </div>
    </div>
  );
};

const Ring = ({ pct = 70, size = 76, stroke = 6 }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <defs>
          <linearGradient id={`gr${size}`} x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor={G.goldD} />
            <stop offset="100%" stopColor={G.goldL} />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.b5} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#gr${size})`} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontFamily: "'Bebas Neue'", fontSize: size * 0.28, color: G.gold, lineHeight: 1 }}>{pct}%</span>
        <span style={{ fontSize: 8, color: G.dim, letterSpacing: 1, fontWeight: 700 }}>DONE</span>
      </div>
    </div>
  );
};

// ─── AUTH SCREEN (login + signup) ────────────────────────────────────────
function AuthScreen() {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [name, setName] = useState("");
  const [role, setRole] = useState("client");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const [hasCoach, setHasCoach] = useState(null);

  useEffect(() => {
    // Check if any coach exists to decide if first signup is coach
    db.collection("users").where("role", "==", "coach").limit(1).get()
      .then(snap => {
        setHasCoach(!snap.empty);
        if (snap.empty && mode === "signup") setRole("coach");
      });
  }, [mode]);

  const submit = async () => {
    setErr(""); setLoading(true);
    try {
      if (mode === "login") {
        await api.signIn(email, pass);
      } else {
        if (!name.trim()) throw new Error("Please enter your name");
        if (pass.length < 6) throw new Error("Password must be at least 6 characters");
        await api.signUp(email, pass, name.trim(), role);
      }
    } catch (e) {
      setErr(e.message.replace("Firebase: ", "").replace(/\(auth\/[^)]+\)/, "").trim());
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100%", background: G.black, display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: 24, position: "relative", overflowY: "auto" }}>
      <div style={{ position: "absolute", top: -120, right: -80, width: 320, height: 320,
        background: `radial-gradient(circle, ${G.glow} 0%, transparent 70%)`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", bottom: -80, left: -60, width: 240, height: 240,
        background: `radial-gradient(circle, ${G.glow} 0%, transparent 70%)`, pointerEvents: "none" }} />

      <div className="fu" style={{ textAlign: "center", marginBottom: 30 }}>
        <Logo size={46} />
        <div style={{ fontSize: 11, letterSpacing: 4, color: G.dim, textTransform: "uppercase",
          fontWeight: 500, marginTop: 4 }}>by James McCahill</div>
      </div>

      <div className="fu d1" style={{ width: "100%", maxWidth: 360, background: G.b2,
        border: `1px solid ${G.border}`, borderRadius: 18, padding: 26,
        boxShadow: `0 24px 60px rgba(0,0,0,.6)` }}>
        <div style={{ display: "flex", gap: 3, background: G.b4, padding: 3, borderRadius: 10, marginBottom: 20 }}>
          {["login", "signup"].map(m => (
            <button key={m} onClick={() => { setMode(m); setErr(""); }}
              style={{ flex: 1, padding: "9px 0", borderRadius: 8, fontSize: 11,
                fontWeight: 800, letterSpacing: 1.5, textTransform: "uppercase",
                background: mode === m ? G.gold : "transparent",
                color: mode === m ? G.black : G.dim }}>
              {m === "login" ? "Sign In" : "Create Account"}
            </button>
          ))}
        </div>

        {mode === "signup" && (
          <>
            <Input label="Full Name" value={name} onChange={setName} placeholder="John Smith" />
            {hasCoach !== null && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: G.dim, marginBottom: 6, fontWeight: 700 }}>
                  I am a...
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setRole("client")}
                    style={{ flex: 1, padding: "11px", borderRadius: 10, fontSize: 12, fontWeight: 700,
                      background: role === "client" ? G.gold : G.b4,
                      color: role === "client" ? G.black : G.dim,
                      border: `1px solid ${role === "client" ? G.gold : G.b5}` }}>
                    👤 Client
                  </button>
                  <button onClick={() => setRole("coach")} disabled={hasCoach}
                    style={{ flex: 1, padding: "11px", borderRadius: 10, fontSize: 12, fontWeight: 700,
                      background: role === "coach" ? G.gold : G.b4,
                      color: role === "coach" ? G.black : G.dim,
                      border: `1px solid ${role === "coach" ? G.gold : G.b5}`,
                      opacity: hasCoach ? 0.4 : 1, cursor: hasCoach ? "not-allowed" : "pointer" }}>
                    ⭐ Coach {hasCoach && "(taken)"}
                  </button>
                </div>
              </div>
            )}
          </>
        )}
        <Input label="Email" type="email" value={email} onChange={setEmail} placeholder="your@email.com" />
        <Input label="Password" type="password" value={pass} onChange={setPass} placeholder="••••••••" />

        {err && <div style={{ color: G.red, fontSize: 12, marginBottom: 12, fontWeight: 600 }}>⚠ {err}</div>}

        <GoldBtn onClick={submit} disabled={loading} style={{ width: "100%" }}>
          {loading ? "Please wait…" : (mode === "login" ? "Sign In" : "Create Account")}
        </GoldBtn>

        {mode === "signup" && hasCoach === false && (
          <div style={{ marginTop: 14, padding: 12, background: G.glow, borderRadius: 10,
            border: `1px solid ${G.border}`, fontSize: 11, color: G.goldL, lineHeight: 1.5 }}>
            💡 <strong>You're the first user</strong> — you'll be set as the coach. Share this app URL with your clients so they can sign up.
          </div>
        )}
      </div>
    </div>
  );
}

        <div className="fu d1" style={{ fontFamily: "'Bebas Neue'", fontSize: 36, letterSpacing: 2 }}>

            🔥 {completed} Sessions Complete

      <div className="fu d2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, padding: "14px 20px" }}>

function ClientTraining({ user }) {
  const [progs, setProgs] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [activeWorkout, setActiveWorkout] = useState(null);
  const [logs, setLogs] = useState({});
  const [note, setNote] = useState("");
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([api.getClientProgrammes(user.id), api.getSessions(user.id)])
      .then(([p, s]) => { setProgs(p); setSessions(s); setLoading(false); });
    const unsub = api.watchSessions(user.id, setSessions);
    return unsub;
  }, [user.id]);

  const finishWorkout = async (w, prog) => {
    setSaving(true);
    try {
      await api.logSession({
        clientId: user.id, workoutId: w.id, progId: prog.id,
        workoutName: w.name, date: new Date().toISOString().split("T")[0],
        completed: true, notes: note, logs,
      });
      setDone(true);
      setTimeout(() => { setActiveWorkout(null); setLogs({}); setNote(""); setDone(false); }, 1800);
    } catch (e) {
      alert("Failed to save: " + e.message);
    }
    setSaving(false);
  };

  if (loading) return <Loading />;

  if (activeWorkout) {
    const { w, prog } = activeWorkout;
    return (
      <div>
        <div style={{ background: G.b2, padding: "16px 20px", borderBottom: `1px solid ${G.border}`,
          display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setActiveWorkout(null)} style={{ fontSize: 20, color: G.dim }}>←</button>
          <div>
            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 1 }}>{w.name}</div>
            <div style={{ fontSize: 11, color: G.dim }}>{prog.name}</div>
          </div>
        </div>
        {done ? (
          <div style={{ padding: 60, textAlign: "center" }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>🏆</div>
            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 32, color: G.gold }}>SESSION COMPLETE!</div>
            <div style={{ color: G.dim, marginTop: 8 }}>Saving to your record…</div>
          </div>
        ) : (
          <div style={{ padding: 20 }}>
            {w.exercises.map((ex, i) => (
              <Card key={i} style={{ marginBottom: 12 }}>
                <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 4 }}>{ex.name}</div>
                <div style={{ fontSize: 12, color: G.dim, marginBottom: 10 }}>
                  {ex.sets} sets × {ex.reps} · Rest {ex.rest}
                  {ex.notes && <span style={{ color: G.gold }}> · {ex.notes}</span>}
                </div>
                <Input label="Log weight / reps" value={logs[ex.name] || ""}
                  onChange={v => setLogs(prev => ({ ...prev, [ex.name]: v }))}
                  placeholder="e.g. 100kg × 6" />
              </Card>
            ))}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, letterSpacing: 2, color: G.dim, textTransform: "uppercase",
                fontWeight: 700, marginBottom: 6 }}>Session Notes</div>
              <textarea value={note} onChange={e => setNote(e.target.value)}
                placeholder="How did it feel? Any PBs?"
                style={{ width: "100%", background: G.b4, border: `1px solid ${G.b5}`,
                  borderRadius: 10, padding: "13px 16px", fontSize: 13, color: G.white,
                  minHeight: 80, resize: "none", fontFamily: "'Barlow'" }} />
            </div>
            <GoldBtn onClick={() => finishWorkout(w, prog)} disabled={saving} style={{ width: "100%" }}>
              {saving ? "Saving…" : "✓ Complete Session"}
            </GoldBtn>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ paddingBottom: 20 }}>
      <SectionTitle>MY TRAINING</SectionTitle>
      {progs.length === 0 ? (
        <EmptyState icon="📋" title="No programmes assigned" desc="Message your coach to get started." />
      ) : progs.map(prog => {
        const ws = prog.workouts || [];
        return (
          <div key={prog.id} style={{ padding: "0 20px 20px" }}>
            <div style={{ background: `linear-gradient(135deg,${G.b3},${G.b4})`,
              border: `1px solid ${G.border}`, borderRadius: 14, overflow: "hidden" }}>
              <div style={{ padding: 16, display: "flex", gap: 12, alignItems: "center",
                borderBottom: `1px solid ${G.b5}` }}>
                <span style={{ fontSize: 32 }}>{prog.emoji}</span>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 15 }}>{prog.name}</div>
                  <div style={{ fontSize: 11, color: G.dim }}>{prog.weeks} weeks · {prog.category}</div>
                  <div style={{ marginTop: 4 }}><Badge>🔥 Active</Badge></div>
                </div>
              </div>
              {ws.length === 0 ? (
                <div style={{ padding: 20, textAlign: "center", color: G.dim, fontSize: 12 }}>
                  No workouts added yet. Your coach will add them shortly.
                </div>
              ) : ws.map(w => {
                const isDone = sessions.find(s => s.workoutId === w.id && s.completed);
                return (
                  <div key={w.id} onClick={() => !isDone && setActiveWorkout({ w, prog })}
                    style={{ display: "flex", alignItems: "center", gap: 12,
                      padding: "13px 16px", borderBottom: `1px solid ${G.b5}`,
                      cursor: isDone ? "default" : "pointer", opacity: isDone ? 0.6 : 1 }}>
                    <div style={{ width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
                      background: isDone ? `${G.gold}20` : G.b5,
                      border: `2px solid ${isDone ? G.gold : G.b5}`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 14 }}>{isDone ? "✓" : "▶"}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 13 }}>W{w.week}D{w.day} — {w.name}</div>
                      <div style={{ fontSize: 11, color: G.dim }}>{w.duration} min · {w.exercises.length} exercises</div>
                    </div>
                    {isDone && <Badge>Done</Badge>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ClientNutrition({ user }) {
  const [targets, setTargets] = useState(null);
  const [meals, setMeals] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: "", time: "", items: "", calories: "", protein: "", carbs: "", fat: "" });
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api.getNutritionTargets(user.id).then(t => { setTargets(t); setLoading(false); });
    const unsub = api.watchTodayMeals(user.id, setMeals);
    return unsub;
  }, [user.id]);

  if (loading || !targets) return <Loading />;

  const totals = meals.reduce((a, m) => ({
    calories: a.calories + (m.calories || 0), protein: a.protein + (m.protein || 0),
    carbs: a.carbs + (m.carbs || 0), fat: a.fat + (m.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const calPct = Math.min(100, Math.round((totals.calories / targets.calories) * 100));

  const addMeal = async () => {
    if (!form.name) return alert("Enter a meal name");
    setSaving(true);
    try {
      await api.addMeal({
        clientId: user.id, date: new Date().toISOString().split("T")[0],
        ...form, calories: +form.calories || 0, protein: +form.protein || 0,
        carbs: +form.carbs || 0, fat: +form.fat || 0,
      });
      setShowAdd(false);
      setForm({ name: "", time: "", items: "", calories: "", protein: "", carbs: "", fat: "" });
    } catch (e) { alert(e.message); }
    setSaving(false);
  };

  const deleteMeal = async (id) => {
    if (!confirm("Delete this meal?")) return;
    await api.deleteMeal(id);
  };

  const r = 60; const circ = 2 * Math.PI * r;

  return (
    <div style={{ paddingBottom: 20 }}>
      <SectionTitle>TODAY'S NUTRITION</SectionTitle>

      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "0 20px 20px" }}>
        <div style={{ position: "relative", width: 140, height: 140, marginBottom: 20 }}>
          <svg width={140} height={140} style={{ transform: "rotate(-90deg)" }}>
            <defs>
              <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor={G.goldD} />
                <stop offset="100%" stopColor={G.goldL} />
              </linearGradient>
            </defs>
            <circle cx={70} cy={70} r={r} fill="none" stroke={G.b5} strokeWidth={10} />
            <circle cx={70} cy={70} r={r} fill="none" stroke="url(#calGrad)" strokeWidth={10}
              strokeLinecap="round" strokeDasharray={circ}
              strokeDashoffset={circ - (calPct / 100) * circ} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 28, color: G.gold, lineHeight: 1 }}>
              {totals.calories.toLocaleString()}
            </div>
            <div style={{ fontSize: 10, color: G.dim, letterSpacing: 1.5, fontWeight: 700 }}>KCAL</div>
            <div style={{ fontSize: 11, color: G.dim }}>of {targets.calories}</div>
          </div>
        </div>

        <div style={{ width: "100%" }}>
          <MacroBar label="Protein" current={totals.protein} target={targets.protein} color={G.gold} />
          <MacroBar label="Carbs" current={totals.carbs} target={targets.carbs} color={G.goldD} />
          <MacroBar label="Fat" current={totals.fat} target={targets.fat} color="#6b4c10" />
        </div>
      </div>

      <SectionTitle action="+ Add Meal" onAction={() => setShowAdd(true)}>MEALS TODAY</SectionTitle>

      {showAdd && (
        <div style={{ margin: "0 20px 16px", background: G.b3, border: `1px solid ${G.border}`,
          borderRadius: 14, padding: 18 }}>
          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 18, letterSpacing: 2, marginBottom: 14 }}>LOG MEAL</div>
          <Input label="Meal name" value={form.name} onChange={v => setForm(p=>({...p,name:v}))} placeholder="Breakfast" />
          <Input label="Time" value={form.time} onChange={v => setForm(p=>({...p,time:v}))} placeholder="07:30" />
          <Input label="Food items" value={form.items} onChange={v => setForm(p=>({...p,items:v}))} placeholder="Eggs, oats, banana" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Input label="Calories" type="number" value={form.calories} onChange={v => setForm(p=>({...p,calories:v}))} placeholder="500" />
            <Input label="Protein (g)" type="number" value={form.protein} onChange={v => setForm(p=>({...p,protein:v}))} placeholder="40" />
            <Input label="Carbs (g)" type="number" value={form.carbs} onChange={v => setForm(p=>({...p,carbs:v}))} placeholder="60" />
            <Input label="Fat (g)" type="number" value={form.fat} onChange={v => setForm(p=>({...p,fat:v}))} placeholder="15" />
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <GoldBtn onClick={addMeal} disabled={saving} sm style={{ flex: 1 }}>{saving ? "Saving…" : "Save"}</GoldBtn>
            <OutlineBtn onClick={() => setShowAdd(false)} style={{ flex: 1 }}>Cancel</OutlineBtn>
          </div>
        </div>
      )}

      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 10 }}>
        {meals.length === 0 ? (
          <div style={{ textAlign: "center", color: G.dim, padding: 30, fontSize: 13 }}>
            No meals logged yet today. Tap + Add Meal to get started.
          </div>
        ) : meals.map(m => (
          <Card key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 13 }}>{m.name}</div>
              <div style={{ fontSize: 11, color: G.dim, marginTop: 2 }}>{m.time} — {m.items}</div>
              <div style={{ fontSize: 11, color: G.dim, marginTop: 2 }}>
                P: {m.protein}g · C: {m.carbs}g · F: {m.fat}g
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
              <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, color: G.gold }}>{m.calories}</div>
              <button onClick={() => deleteMeal(m.id)} style={{ fontSize: 11, color: G.red }}>Delete</button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function ClientMessages({ user }) {
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState("");
  const [coachInfo, setCoachInfo] = useState(null);
  const [loading, setLoading] = useState(true);
  const [sending, setSending] = useState(false);
  const bottomRef = useRef();

  useEffect(() => {
    if (!user.coachId) { setLoading(false); return; }
    api.getUser(user.coachId).then(setCoachInfo);
    const unsub = api.watchConversation(user.id, user.coachId, ms => {
      setMsgs(ms); setLoading(false);
      setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
    });
    return unsub;
  }, [user.id, user.coachId]);

  const send = async () => {
    if (!text.trim()) return;
    setSending(true);
    try {
      await api.sendMessage(user.id, user.coachId, text.trim());
      setText("");
    } catch (e) { alert(e.message); }
    setSending(false);

  if (!user.coachId) return <EmptyState icon="🔗" title="Not linked to a coach" desc="Ask your coach to make sure you're linked." />;
  if (loading) return <Loading />;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <SectionTitle>COACH CHAT</SectionTitle>

        <div style={{ margin: "0 20px 12px", background: G.b3, border: `1px solid ${G.border}`,
          borderRadius: 14, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12 }}>

        flexDirection: "column", gap: 10 }}>

          <div style={{ color: G.dim, textAlign: "center", padding: 30, fontSize: 13 }}>

          </div>
        ) : msgs.map(m => {
          const isMe = m.from === user.id;
          return (
            <div key={m.id} style={{ display: "flex", flexDirection: "column",

                borderBottomRightRadius: isMe ? 4 : 14,
                borderBottomLeftRadius: isMe ? 14 : 4,
                background: isMe ? `linear-gradient(135deg, ${G.goldD}, ${G.gold})` : G.b4,
                border: isMe ? "none" : `1px solid ${G.b5}`,
                color: isMe ? G.black : G.white,
                fontWeight: isMe ? 600 : 400, fontSize: 13, lineHeight: 1.5 }}>
                {m.text}
              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      <div style={{ display: "flex", gap: 10, padding: "10px 20px 4px",
        borderTop: `1px solid ${G.b5}` }}>
        <input value={text} onChange={e => setText(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Message your coach…"
          style={{ flex: 1, background: G.b4, border: `1px solid ${G.b5}`,
            borderRadius: 22, padding: "11px 18px", fontSize: 13, color: G.white }} />

  );
}

function ClientProgress({ user }) {
  const [weight, setWeight] = useState("");
  const [bodyFat, setBodyFat] = useState("");
  const [measurements, setMeasurements] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);

  const load = () => Promise.all([api.getMeasurements(user.id), api.getSessions(user.id)])
    .then(([m, s]) => { setMeasurements(m); setSessions(s); setLoading(false); });

  useEffect(() => { load(); }, [user.id]);

  const addEntry = async () => {
    if (!weight) return alert("Enter weight");
    setSaving(true);
    try {
      await api.addMeasurement({
        clientId: user.id,
        date: new Date().toISOString().split("T")[0],
        weight: +weight, bodyFat: +bodyFat || null,
      });
      setWeight(""); setBodyFat("");
      load();
    } catch (e) { alert(e.message); }
    setSaving(false);
  };

  if (loading) return <Loading />;

  const startW = measurements[0]?.weight || 0;
  const currW = measurements[measurements.length - 1]?.weight || 0;
  const diff = startW ? (currW - startW).toFixed(1) : "0";

  const weights = measurements.map(m=>m.weight);
  const maxW = weights.length ? Math.max(...weights) : 1;
  const minW = weights.length ? Math.min(...weights) : 0;
  const range = maxW - minW || 1;

  return (
    <div style={{ paddingBottom: 20 }}>
      <SectionTitle>PROGRESS</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "0 20px 16px" }}>
        <Card style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 30, color: +diff < 0 ? G.green : (+diff > 0 ? G.red : G.gold) }}>
            {diff > 0 ? "+" : ""}{diff}kg
          </div>
          <div style={{ fontSize: 10, letterSpacing: 1.5, color: G.dim, textTransform: "uppercase", fontWeight: 700 }}>Weight Change</div>
        </Card>
        <Card style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 30, color: G.gold }}>{sessions.filter(s=>s.completed).length}</div>
          <div style={{ fontSize: 10, letterSpacing: 1.5, color: G.dim, textTransform: "uppercase", fontWeight: 700 }}>Sessions Done</div>
        </Card>
      </div>

      <div style={{ padding: "0 20px 20px" }}>
        <Card>
          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 17, letterSpacing: 2, marginBottom: 16 }}>WEIGHT HISTORY</div>
          {measurements.length < 2 ? (
            <div style={{ color: G.dim, fontSize: 13, textAlign: "center", padding: 16 }}>
              Log at least 2 entries to see your chart.
            </div>
          ) : (
            <svg width="100%" height="120" viewBox={`0 0 ${Math.max(measurements.length*50,200)} 120`} preserveAspectRatio="none">
              {measurements.map((p, i) => {
                const x = (i / Math.max(measurements.length - 1, 1)) * 100;
                const y = 100 - ((p.weight - minW) / range) * 80;
                return (
                  <g key={i}>
                    {i > 0 && (() => {
                      const prev = measurements[i-1];
                      const px = ((i-1)/Math.max(measurements.length-1,1))*100;
                      const py = 100 - ((prev.weight-minW)/range)*80;
                      return <line x1={`${px}%`} y1={py} x2={`${x}%`} y2={y} stroke={G.gold} strokeWidth={2} />;
                    })()}
                    <circle cx={`${x}%`} cy={y} r={4} fill={G.gold} />
                    <text x={`${x}%`} y={y-8} textAnchor="middle" fill={G.goldL} fontSize={10}>{p.weight}kg</text>
                    <text x={`${x}%`} y={115} textAnchor="middle" fill={G.dim} fontSize={8}>{p.date.slice(5)}</text>
                  </g>
                );
              })}
            </svg>
          )}
        </Card>
      </div>

      <SectionTitle>LOG MEASUREMENTS</SectionTitle>
      <div style={{ padding: "0 20px 20px" }}>
        <Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <Input label="Weight (kg)" type="number" value={weight} onChange={setWeight} placeholder="83.5" />
            <Input label="Body Fat %" type="number" value={bodyFat} onChange={setBodyFat} placeholder="15" />
          </div>
          <GoldBtn onClick={addEntry} disabled={saving} style={{ width: "100%" }} sm>
            {saving ? "Saving…" : "Log Today's Measurements"}
          </GoldBtn>
        </Card>
      </div>

      <SectionTitle>SESSION HISTORY</SectionTitle>
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 10 }}>
        {sessions.length === 0 ? (
          <div style={{ color: G.dim, textAlign: "center", padding: 20, fontSize: 13 }}>No sessions logged yet.</div>
        ) : [...sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(s => (
          <Card key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 13 }}>✓ {s.workoutName || "Session"}</div>
              <div style={{ fontSize: 11, color: G.dim, marginTop: 2 }}>{s.date}</div>
              {s.notes && <div style={{ fontSize: 11, color: G.gold, marginTop: 4, fontStyle: "italic" }}>"{s.notes}"</div>}
            </div>
            <Badge color={G.green}>Done</Badge>
          </Card>
        ))}
      </div>
    </div>
  );
}

                    <div style={{ fontSize: 11, color: G.dim }}>{m.items}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, color: G.gold }}>{m.calories}</div>
                    <div style={{ fontSize: 10, color: G.dim }}>P:{m.protein} C:{m.carbs} F:{m.fat}</div>
                  </div>
                </div>
              ))}
            </Card>
          </div>
        )}

        {tab === "progress" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card>
              <div style={{ fontFamily: "'Bebas Neue'", fontSize: 17, letterSpacing: 2, marginBottom: 12 }}>WEIGHT HISTORY</div>
              {measurements.length < 2 ? (
                <div style={{ color: G.dim, fontSize: 12 }}>Not enough data yet.</div>
              ) : (() => {
                const wts = measurements.map(x=>x.weight);
                const max = Math.max(...wts), min = Math.min(...wts);
                const rng = max - min || 1;
                return (
                  <svg width="100%" height="110" viewBox={`0 0 ${Math.max(measurements.length*50,200)} 110`} preserveAspectRatio="none">
                    {measurements.map((p, i) => {
                      const x = (i/Math.max(measurements.length-1,1))*100;
                      const y = 90 - ((p.weight-min)/rng)*75;
                      return (
                        <g key={i}>
                          {i > 0 && (() => {
                            const prev = measurements[i-1];
                            const px = ((i-1)/Math.max(measurements.length-1,1))*100;
                            const py = 90 - ((prev.weight-min)/rng)*75;
                            return <line x1={`${px}%`} y1={py} x2={`${x}%`} y2={y} stroke={G.gold} strokeWidth={2}/>;
                          })()}
                          <circle cx={`${x}%`} cy={y} r={4} fill={G.gold}/>
                          <text x={`${x}%`} y={y-8} textAnchor="middle" fill={G.goldL} fontSize={10}>{p.weight}</text>
                          <text x={`${x}%`} y={105} textAnchor="middle" fill={G.dim} fontSize={8}>{p.date.slice(5)}</text>
                        </g>
                      );
                    })}
                  </svg>
                );
              })()}
            </Card>
            <Card>
              <div style={{ fontFamily: "'Bebas Neue'", fontSize: 17, letterSpacing: 2, marginBottom: 10 }}>MEASUREMENTS</div>
              {measurements.length === 0 ? (
                <div style={{ color: G.dim, fontSize: 12 }}>No measurements logged.</div>
              ) : [...measurements].reverse().map(entry => (
                <div key={entry.id} style={{ display: "flex", justifyContent: "space-between",
                  padding: "8px 0", borderBottom: `1px solid ${G.b5}` }}>
                  <span style={{ fontWeight: 700 }}>{entry.date}</span>
                  <span style={{ color: G.gold }}>{entry.weight}kg {entry.bodyFat ? `· ${entry.bodyFat}% BF` : ""}</span>
                </div>
              ))}
            </Card>
          </div>
        )}

        {tab === "chat" && (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 10, marginBottom: 10, minHeight: 300 }}>
              {msgs.map(m => {
                const isMe = m.from === user.id;
                return (
                  <div key={m.id} style={{ display: "flex", flexDirection: "column",
                    alignItems: isMe ? "flex-end" : "flex-start" }}>
                    <div style={{ maxWidth: "85%", padding: "10px 14px", borderRadius: 14,
                      borderBottomRightRadius: isMe ? 4 : 14,
                      borderBottomLeftRadius: isMe ? 14 : 4,
                      background: isMe ? `linear-gradient(135deg, ${G.goldD}, ${G.gold})` : G.b4,
                      border: isMe ? "none" : `1px solid ${G.b5}`,
                      color: isMe ? G.black : G.white,
                      fontWeight: isMe ? 600 : 400, fontSize: 13, lineHeight: 1.5 }}>
                      {m.text}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <input value={chatText} onChange={e => setChatText(e.target.value)}
                onKeyDown={e => e.key === "Enter" && sendMsg()}
                placeholder={`Message ${client.name}…`}
                style={{ flex: 1, background: G.b4, border: `1px solid ${G.b5}`,
                  borderRadius: 22, padding: "11px 18px", fontSize: 13, color: G.white }} />
              <button onClick={sendMsg} style={{ width: 42, height: 42, borderRadius: "50%",
                background: `linear-gradient(135deg, ${G.goldD}, ${G.gold})`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16, flexShrink: 0 }}>➤</button>
            </div>
          </div>
        )}
      </div>

      {showAssign && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", zIndex: 99,
          display: "flex", alignItems: "flex-end" }}>
          <div style={{ width: "100%", maxWidth: 430, margin: "0 auto",
            background: G.b2, borderRadius: "18px 18px 0 0",
            border: `1px solid ${G.border}`, padding: 24, maxHeight: "70vh", overflowY: "auto" }}>
            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: 2, marginBottom: 16 }}>
              ASSIGN PROGRAMME
            </div>
            {allProgs.length === 0 ? (
              <div style={{ color: G.dim, textAlign: "center", padding: 20 }}>
                No programmes yet. Create one in the Plans tab.
              </div>
            ) : allProgs.map(p => {
              const assigned = (p.assignedTo || []).includes(client.id);
              return (
                <div key={p.id} onClick={() => !assigned && assignProg(p.id)}
                  style={{ display: "flex", gap: 12, alignItems: "center", padding: "12px 0",
                    borderBottom: `1px solid ${G.b5}`, cursor: assigned ? "default" : "pointer",
                    opacity: assigned ? 0.5 : 1 }}>
                  <span style={{ fontSize: 26 }}>{p.emoji}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800 }}>{p.name}</div>
                    <div style={{ fontSize: 12, color: G.dim }}>{p.weeks} weeks · {p.category}</div>
                  </div>
                  {assigned && <Badge>Assigned</Badge>}
                </div>
              );
            })}
            <button onClick={() => setShowAssign(false)} style={{ width: "100%", marginTop: 16,
              padding: 14, borderRadius: 10, background: G.b4, fontWeight: 700, color: G.dim }}>
              Close
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function CoachProgrammes({ user }) {
  const [progs, setProgs] = useState([]);
  const [editing, setEditing] = useState(null);
  const [showCreate, setShowCreate] = useState(false);

  useEffect(() => {
    const unsub = api.watchProgrammes(user.id, setProgs);
    return unsub;
  }, [user.id]);

  if (editing) {
    return <ProgrammeEditor user={user} programme={editing} onBack={() => setEditing(null)} />;
  }

  if (showCreate) {
    return <ProgrammeEditor user={user} programme={null} onBack={() => setShowCreate(false)} />;
  }

  return (
    <div style={{ paddingBottom: 20 }}>
      <SectionTitle action="+ Create" onAction={() => setShowCreate(true)}>PROGRAMMES</SectionTitle>
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 12 }}>
        {progs.length === 0 ? (
          <EmptyState icon="📋" title="No programmes yet" desc="Create your first training programme." />
        ) : progs.map(p => (
          <Card key={p.id} onClick={() => setEditing(p)}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ fontSize: 32 }}>{p.emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 800, fontSize: 14 }}>{p.name}</div>
                <div style={{ fontSize: 11, color: G.dim, marginTop: 2 }}>
                  {p.weeks} weeks · {p.category} · {(p.workouts || []).length} workouts
                </div>
                <div style={{ fontSize: 12, color: G.dim, marginTop: 4, lineHeight: 1.5 }}>{p.description}</div>
                <div style={{ marginTop: 8, display: "flex", gap: 6, alignItems: "center" }}>
                  <Badge>{(p.assignedTo || []).length} clients</Badge>
                </div>
              </div>
              <span style={{ color: G.dim, fontSize: 18 }}>›</span>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function ProgrammeEditor({ user, programme, onBack }) {
  const [name, setName] = useState(programme?.name || "");
  const [emoji, setEmoji] = useState(programme?.emoji || "🏋️");
  const [weeks, setWeeks] = useState(programme?.weeks || 8);
  const [category, setCategory] = useState(programme?.category || "Strength");
  const [description, setDescription] = useState(programme?.description || "");
  const [workouts, setWorkouts] = useState(programme?.workouts || []);
  const [editingWk, setEditingWk] = useState(null);
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!name) return alert("Enter a name");
    setSaving(true);
    try {
      if (programme) {
        await api.updateProgramme(programme.id, { name, emoji, weeks: +weeks, category, description, workouts });
      } else {
        await api.createProgramme({ name, emoji, weeks: +weeks, category, description, workouts, coachId: user.id });
      }
      onBack();
    } catch (e) { alert(e.message); }
    setSaving(false);
  };

  const addWorkout = () => {
    const newWk = {
      id: `w${Date.now()}`, week: 1, day: (workouts.length + 1),
      name: "New Workout", duration: 45, exercises: [],
    };
    setEditingWk(newWk);
  };

  const saveWorkout = (wk) => {
    const existing = workouts.findIndex(w => w.id === wk.id);
    if (existing >= 0) {
      const updated = [...workouts];
      updated[existing] = wk;
      setWorkouts(updated);
    } else {
      setWorkouts([...workouts, wk]);
    }
    setEditingWk(null);
  };

  const deleteWorkout = (id) => {
    if (!confirm("Delete this workout?")) return;
    setWorkouts(workouts.filter(w => w.id !== id));
  };

  if (editingWk) {
    return <WorkoutEditor workout={editingWk} onSave={saveWorkout} onCancel={() => setEditingWk(null)}
      onDelete={() => { deleteWorkout(editingWk.id); setEditingWk(null); }} />;
  }

  return (
    <div style={{ paddingBottom: 20 }}>
      <div style={{ padding: "14px 20px", background: G.b2, borderBottom: `1px solid ${G.border}`,
        display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onBack} style={{ fontSize: 20, color: G.dim }}>←</button>
        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 1.5, flex: 1 }}>
          {programme ? "EDIT PROGRAMME" : "NEW PROGRAMME"}
        </div>
        <GoldBtn onClick={save} sm disabled={saving}>{saving ? "…" : "Save"}</GoldBtn>
      </div>
      <div style={{ padding: 20 }}>
        <Input label="Name" value={name} onChange={setName} placeholder="Power Performance" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <Input label="Emoji" value={emoji} onChange={setEmoji} />
          <Input label="Duration (weeks)" type="number" value={weeks} onChange={setWeeks} />
        </div>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: G.dim, marginBottom: 6, fontWeight: 700 }}>Category</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {["Strength","Cardio","Sport","Recovery"].map(c => (
              <button key={c} onClick={() => setCategory(c)}
                style={{ padding: "7px 14px", borderRadius: 20, fontSize: 11, fontWeight: 700,
                  background: category === c ? G.gold : G.b4,
                  color: category === c ? G.black : G.dim,
                  border: `1px solid ${category === c ? G.gold : G.b5}` }}>{c}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: G.dim, marginBottom: 6, fontWeight: 700 }}>Description</div>
          <textarea value={description} onChange={e => setDescription(e.target.value)}
            placeholder="Describe this programme…"
            style={{ width: "100%", background: G.b4, border: `1px solid ${G.b5}`,
              borderRadius: 10, padding: "12px 16px", fontSize: 13, color: G.white,
              minHeight: 80, resize: "none", fontFamily: "'Barlow'" }} />
        </div>

        <SectionTitle action="+ Add Workout" onAction={addWorkout}>WORKOUTS ({workouts.length})</SectionTitle>
        {workouts.length === 0 ? (
          <div style={{ color: G.dim, textAlign: "center", padding: 20, fontSize: 13 }}>
            No workouts yet. Tap + Add Workout to create one.
          </div>
        ) : workouts.map(w => (
          <Card key={w.id} onClick={() => setEditingWk(w)} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 13 }}>W{w.week}D{w.day} — {w.name}</div>
                <div style={{ fontSize: 11, color: G.dim, marginTop: 2 }}>
                  {w.duration} min · {w.exercises.length} exercises
                </div>
              </div>
              <span style={{ color: G.dim, fontSize: 18 }}>›</span>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function WorkoutEditor({ workout, onSave, onCancel, onDelete }) {
  const [wk, setWk] = useState({ ...workout });

  const updateEx = (i, field, val) => {
    const ex = [...wk.exercises];
    ex[i] = { ...ex[i], [field]: val };
    setWk({ ...wk, exercises: ex });
  };

  const addEx = () => setWk({ ...wk, exercises: [...wk.exercises, { name: "", sets: 3, reps: "10", rest: "90s", notes: "" }] });
  const removeEx = (i) => setWk({ ...wk, exercises: wk.exercises.filter((_,j) => j !== i) });

  return (
    <div style={{ paddingBottom: 20 }}>
      <div style={{ padding: "14px 20px", background: G.b2, borderBottom: `1px solid ${G.border}`,
        display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onCancel} style={{ fontSize: 20, color: G.dim }}>←</button>
        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 1.5, flex: 1 }}>EDIT WORKOUT</div>
        <GoldBtn onClick={() => onSave(wk)} sm>Save</GoldBtn>
      </div>
      <div style={{ padding: 20 }}>
        <Input label="Workout name" value={wk.name} onChange={v => setWk(p=>({...p,name:v}))} placeholder="Power Strength A" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          <Input label="Week" type="number" value={wk.week} onChange={v => setWk(p=>({...p,week:+v}))} />
          <Input label="Day" type="number" value={wk.day} onChange={v => setWk(p=>({...p,day:+v}))} />
          <Input label="Duration (min)" type="number" value={wk.duration} onChange={v => setWk(p=>({...p,duration:+v}))} />
        </div>

        <SectionTitle action="+ Exercise" onAction={addEx}>EXERCISES</SectionTitle>
        {wk.exercises.map((ex, i) => (
          <Card key={i} style={{ marginBottom: 10 }}>
            <Input label={`Exercise ${i+1} name`} value={ex.name} onChange={v => updateEx(i,"name",v)} placeholder="Back Squat" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <Input label="Sets" type="number" value={ex.sets} onChange={v => updateEx(i,"sets",+v)} />
              <Input label="Reps" value={ex.reps} onChange={v => updateEx(i,"reps",v)} placeholder="6" />
              <Input label="Rest" value={ex.rest} onChange={v => updateEx(i,"rest",v)} placeholder="2 min" />
            </div>
            <Input label="Coach notes" value={ex.notes} onChange={v => updateEx(i,"notes",v)} placeholder="Build to 85% 1RM" />
            <button onClick={() => removeEx(i)} style={{ fontSize: 11, color: G.red, fontWeight: 700 }}>Remove exercise</button>
          </Card>
        ))}

        <button onClick={onDelete} style={{ width: "100%", marginTop: 20, padding: 12,
          borderRadius: 10, border: `1px solid ${G.red}40`, color: G.red, fontWeight: 700, fontSize: 12 }}>
          Delete Workout
        </button>
      </div>
    </div>
  );
}

function CoachMessages({ user }) {
  const [clients, setClients] = useState([]);
  const [selected, setSelected] = useState(null);
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState("");

  useEffect(() => {
    const unsub = api.watchClients(user.id, setClients);
    return unsub;
  }, [user.id]);

  useEffect(() => {
    if (!selected) return;
    const unsub = api.watchConversation(user.id, selected.id, setMsgs);
    return unsub;
  }, [selected, user.id]);

  const sendMsg = async () => {
    if (!text.trim() || !selected) return;
    await api.sendMessage(user.id, selected.id, text.trim());
    setText("");
  };

  if (selected) {
    return (
      <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
        <div style={{ padding: "14px 20px", background: G.b2, borderBottom: `1px solid ${G.border}`,
          display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => setSelected(null)} style={{ fontSize: 20, color: G.dim }}>←</button>
          <Avatar initials={selected.avatar} size={34} />
          <div style={{ fontWeight: 800, fontSize: 14 }}>{selected.name}</div>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "14px 20px", display: "flex",
          flexDirection: "column", gap: 10 }}>
          {msgs.length === 0 ? (
            <div style={{ color: G.dim, textAlign: "center", padding: 30, fontSize: 13 }}>
              No messages yet.
            </div>
          ) : msgs.map(m => {
            const isMe = m.from === user.id;
            return (
              <div key={m.id} style={{ display: "flex", flexDirection: "column",
                alignItems: isMe ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth: "82%", padding: "10px 14px", borderRadius: 14,
                  borderBottomRightRadius: isMe ? 4 : 14, borderBottomLeftRadius: isMe ? 14 : 4,
                  background: isMe ? `linear-gradient(135deg,${G.goldD},${G.gold})` : G.b4,
                  border: isMe ? "none" : `1px solid ${G.b5}`,
                  color: isMe ? G.black : G.white, fontWeight: isMe ? 600 : 400, fontSize: 13, lineHeight: 1.5 }}>
                  {m.text}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 10, padding: "10px 20px",
          borderTop: `1px solid ${G.b5}` }}>
          <input value={text} onChange={e => setText(e.target.value)}
            onKeyDown={e => e.key === "Enter" && sendMsg()}
            placeholder={`Message ${selected.name}…`}
            style={{ flex: 1, background: G.b4, border: `1px solid ${G.b5}`,
              borderRadius: 22, padding: "11px 18px", fontSize: 13, color: G.white }} />
          <button onClick={sendMsg} style={{ width: 42, height: 42, borderRadius: "50%",
            background: `linear-gradient(135deg,${G.goldD},${G.gold})`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 16, flexShrink: 0 }}>➤</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ paddingBottom: 20 }}>
      <SectionTitle>MESSAGES</SectionTitle>
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 10 }}>
        {clients.length === 0 ? (
          <EmptyState icon="💬" title="No clients yet" desc="Clients will appear here when they sign up." />
        ) : clients.map(c => (
          <Card key={c.id} onClick={() => setSelected(c)}
            style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <Avatar initials={c.avatar} size={44} />
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 14 }}>{c.name}</div>
              <div style={{ fontSize: 12, color: G.dim, marginTop: 2 }}>{c.email}</div>
            </div>
            <span style={{ color: G.dim, fontSize: 18 }}>›</span>
          </Card>
        ))}
      </div>
    </div>
  );
}

function CoachApp({ user, onLogout }) {
  const [tab, setTab] = useState("dashboard");
  const tabs = [
    { id: "dashboard", icon: "📊", label: "Home" },
    { id: "clients", icon: "👥", label: "Clients" },
    { id: "programmes", icon: "📋", label: "Plans" },
    { id: "messages", icon: "💬", label: "Messages" },
  ];
  const screens = {
    dashboard: <CoachDashboard user={user} />,
    clients: <CoachClients user={user} />,
    programmes: <CoachProgrammes user={user} />,
    messages: <CoachMessages user={user} />,
  };
  return (
    <AppShell user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab}>
      {screens[tab]}
    </AppShell>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if (fbUser) {
        const profile = await api.getUser(fbUser.uid);
        setUser(profile);
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  const logout = async () => {
    if (confirm("Sign out?")) {
      await api.signOut();
    }
  };

  if (loading) return <div className="loader"><div className="spinner"/><div className="loader-text">LEVELUP</div></div>;
  if (!user) return <AuthScreen />;
  if (user.role === "coach") return <CoachApp user={user} onLogout={logout} />;
  return <ClientApp user={user} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
