/* ── FIREBASE API ─────────────────────────────────────────── */
const api=(()=>{
if(!window.**FB**)return{};
const{auth,db,FV}=window.__fb;
return{
signUp:async(email,pass,name,role)=>{
const c=await auth.createUserWithEmailAndPassword(email,pass);
const av=name.split(’ ‘).map(w=>w[0]).join(’’).toUpperCase().slice(0,2);
let coachId=null;
if(role===‘client’){const q=await db.collection(‘users’).where(‘role’,’==’,‘coach’).limit(1).get();if(!q.empty)coachId=q.docs[0].id;}
await db.collection(‘users’).doc(c.user.uid).set({email,name,role,avatar:av,coachId,createdAt:FV.serverTimestamp()});
if(role===‘client’)await db.collection(‘nutrTargets’).doc(c.user.uid).set({calories:2200,protein:170,carbs:250,fat:70});
},
signIn:(e,p)=>auth.signInWithEmailAndPassword(e,p),
signOut:()=>auth.signOut(),
getUser:async uid=>{const d=await db.collection(‘users’).doc(uid).get();return d.exists?{id:d.id,…d.data()}:null;},
watchAuth:cb=>auth.onAuthStateChanged(cb),
watchClients:(cid,cb)=>db.collection(‘users’).where(‘coachId’,’==’,cid).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,…d.data()})))),
watchProgs:(cid,cb)=>db.collection(‘programmes’).where(‘coachId’,’==’,cid).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,…d.data()})))),
getClientProgs:async cid=>{const s=await db.collection(‘programmes’).where(‘assignedTo’,‘array-contains’,cid).get();return s.docs.map(d=>({id:d.id,…d.data()}));},
createProg:d=>db.collection(‘programmes’).add({…d,assignedTo:[],createdAt:FV.serverTimestamp()}),
updateProg:(id,d)=>db.collection(‘programmes’).doc(id).update(d),
assignProg:(pid,cid)=>db.collection(‘programmes’).doc(pid).update({assignedTo:FV.arrayUnion(cid)}),
unassignProg:(pid,cid)=>db.collection(‘programmes’).doc(pid).update({assignedTo:FV.arrayRemove(cid)}),
watchSessions:(cid,cb)=>db.collection(‘sessions’).where(‘clientId’,’==’,cid).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,…d.data()})))),
getSessions:async cid=>{const s=await db.collection(‘sessions’).where(‘clientId’,’==’,cid).get();return s.docs.map(d=>({id:d.id,…d.data()}));},
logSession:d=>db.collection(‘sessions’).add({…d,at:FV.serverTimestamp()}),
watchMsgs:(a,b,cb)=>db.collection(‘messages’).where(‘participants’,‘array-contains’,a).orderBy(‘createdAt’,‘asc’).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,…d.data()})).filter(m=>m.participants.includes(b)))),
sendMsg:(from,to,text)=>db.collection(‘messages’).add({from,to,text,participants:[from,to].sort(),createdAt:FV.serverTimestamp()}),
getNutr:async cid=>{const d=await db.collection(‘nutrTargets’).doc(cid).get();return d.exists?d.data():{calories:2200,protein:170,carbs:250,fat:70};},
setNutr:(cid,t)=>db.collection(‘nutrTargets’).doc(cid).set(t),
watchMeals:(cid,cb)=>{const t=new Date().toISOString().split(‘T’)[0];return db.collection(‘meals’).where(‘clientId’,’==’,cid).where(‘date’,’==’,t).onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,…d.data()}))));},
addMeal:d=>db.collection(‘meals’).add({…d,at:FV.serverTimestamp()}),
delMeal:id=>db.collection(‘meals’).doc(id).delete(),
getMeasurements:async cid=>{const s=await db.collection(‘measurements’).where(‘clientId’,’==’,cid).orderBy(‘date’,‘asc’).get();return s.docs.map(d=>({id:d.id,…d.data()}));},
addMeasurement:d=>db.collection(‘measurements’).add(d),
};
})();

{hasCoach!==null&&<div style={{marginBottom:12}}>

))}
</div>
</div>}
</>}

const ActiveWorkout=({workout,prog,prevSessions,clientId,onDone,onCancel})=>{
const[sets,setSets]=useState(()=>(workout.exercises||[]).map(ex=>({exName:ex.name||ex,rows:Array.from({length:ex.sets||3},(_,i)=>({id:i,kg:’’,reps:’’,done:false}))})));
const[note,setNote]=useState(’’);
const[elapsed,setElapsed]=useState(0);
const[rest,setRest]=useState(null);
const[saving,setSaving]=useState(false);
const[fin,setFin]=useState(false);
useEffect(()=>{const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[]);
useEffect(()=>{if(rest===null||rest<=0){if(rest===0)setRest(null);return;}const t=setTimeout(()=>setRest(r=>r-1),1000);return()=>clearTimeout(t);},[rest]);
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const updRow=(ei,ri,f,v)=>setSets(p=>p.map((s,i)=>i!==ei?s:{…s,rows:s.rows.map((r,j)=>j!==ri?r:{…r,[f]:v})}));
const toggleDone=(ei,ri)=>setSets(p=>{const n=p.map((s,i)=>i!==ei?s:{…s,rows:s.rows.map((r,j)=>j!==ri?r:{…r,done:!r.done})});if(!p[ei].rows[ri].done)setRest(90);return n;});
const addRow=ei=>setSets(p=>p.map((s,i)=>i!==ei?s:{…s,rows:[…s.rows,{id:s.rows.length,kg:’’,reps:’’,done:false}]}));
const totalDone=sets.reduce((a,s)=>a+s.rows.filter(r=>r.done).length,0);
const totalSets=sets.reduce((a,s)=>a+s.rows.length,0);
const getPrev=ex=>{for(const s of[…prevSessions].reverse()){if(s.logs&&s.logs[ex])return s.logs[ex];}return null;};
const finish=async()=>{
setSaving(true);
const logs={};
sets.forEach(s=>{logs[s.exName]=s.rows.filter(r=>r.done).map(r=>`${r.kg||'?'}kg×${r.reps||'?'}`).join(’, ’);});
try{await api.logSession({clientId,workoutId:workout.id||`w${Date.now()}`,progId:prog.id,workoutName:workout.name,date:new Date().toISOString().split(‘T’)[0],completed:true,notes:note,logs,duration:elapsed});setFin(true);setTimeout(onDone,1800);}
catch(e){alert(e.message);}
setSaving(false);
};
if(fin)return(

</div>
);

<div style={{fontSize:10,color:G.w40,marginTop:4,textAlign:‘center’,letterSpacing:1}}>{totalDone} of {totalSets} sets done</div>

{/* rest timer */}
{rest!==null&&(

const CNutrition=({user})=>{

useEffect(()=>{api.getNutr(user.id).then(setTargets);const u=api.watchMeals(user.id,setMeals);return u;},[user.id]);
if(!targets)return<Loader/>;
const tot=meals.reduce((a,m)=>({calories:a.calories+(m.calories||0),protein:a.protein+(m.protein||0),carbs:a.carbs+(m.carbs||0),fat:a.fat+(m.fat||0)}),{calories:0,protein:0,carbs:0,fat:0});
const cp=Math.min(100,targets.calories?Math.round(tot.calories/targets.calories*100):0);
const r=52,ci=2*Math.PI*r;
const addMeal=async()=>{if(!f.name)return;setSaving(true);try{await api.addMeal({clientId:user.id,date:new Date().toISOString().split(‘T’)[0],…f,calories:+f.calories||0,protein:+f.protein||0,carbs:+f.carbs||0,fat:+f.fat||0});setShowAdd(false);setF({name:’’,time:’’,items:’’,calories:’’,protein:’’,carbs:’’,fat:’’});}catch(e){alert(e.message);}setSaving(false);};

<div style={{paddingBottom:20}}>

<circle cx={59} cy={59} r={r} fill="none" stroke={G.s3} strokeWidth={9}/>
<circle cx={59} cy={59} r={r} fill="none" stroke="url(#cg)" strokeWidth={9} strokeLinecap="round" strokeDasharray={ci} strokeDashoffset={ci-(cp/100)*ci}/>

<div style={{position:‘absolute’,inset:0,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,justifyContent:‘center’}}>
<div style={{fontFamily:”‘Bebas Neue’”,fontSize:22,color:G.pL,lineHeight:1}}>{tot.calories.toLocaleString()}</div>
<div style={{fontSize:8,color:G.w40,letterSpacing:1.5,fontWeight:700}}>KCAL</div>
<div style={{fontSize:10,color:G.w70}}>of {targets.calories}</div>
</div>
</div>
<div style={{flex:1}}>
<MBar label="Protein" current={tot.protein} target={targets.protein} color={G.p}/>
<MBar label="Carbs" current={tot.carbs} target={targets.carbs} color="#6b9fff"/>
<MBar label="Fat" current={tot.fat} target={targets.fat} color="#ff8c42"/>
</div>
</div>
<SH action=”+ Log Meal” onAction={()=>setShowAdd(true)}>Today’s Meals</SH>
{showAdd&&(
<div style={{margin:‘0 20px 12px’,background:G.s2,border:`1px solid ${G.pBorder}`,borderRadius:14,padding:16}}>

<Inp label=“Foods” value={f.items} onChange={v=>setF(p=>({…p,items:v}))} placeholder=“Eggs, oats, banana”/>
<div style={{display:‘grid’,gridTemplateColumns:‘1fr 1fr 1fr 1fr’,gap:8,marginBottom:12}}>
{[‘calories’,‘protein’,‘carbs’,‘fat’].map(k=><div key={k}><div style={{fontSize:9,color:G.w40,letterSpacing:1,textTransform:‘uppercase’,fontWeight:600,marginBottom:4}}>{k}</div><input type=“number” value={f[k]} onChange={e=>setF(p=>({…p,[k]:e.target.value}))} placeholder=“0” style={{width:‘100%’,background:G.s3,border:`1.5px solid ${G.s4}`,borderRadius:8,padding:‘9px 6px’,fontSize:12,fontWeight:700,textAlign:‘center’,color:G.white}}/></div>)}
</div>
<div style={{display:‘flex’,gap:8}}><Btn onClick={addMeal} disabled={saving} sm sx={{flex:1}}>{saving?’…’:‘Save’}</Btn><Btn variant=“ghost” onClick={()=>setShowAdd(false)} sm sx={{flex:1}}>Cancel</Btn></div>

)}

}

))

</div>
);
};

);
})}
</Card>
))}
</div>}
{/* NUTRITION */}
{tab===‘nutrition’&&nutr&&<div style={{display:‘flex’,flexDirection:‘column’,gap:10}}>
<Card sx={{padding:14}}>
<div style={{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginBottom:10}}>
<div style={{fontSize:10,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:700}}>Daily Targets</div>
<button onClick={()=>setEditTgt(!editTgt)} style={{fontSize:11,color:G.pL,fontWeight:700}}>{editTgt?‘Cancel’:‘Edit’}</button>
</div>
{editTgt?(
<>
<div style={{display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:10}}>
<Inp label=“Calories” type=“number” value={tf.calories||’’} onChange={v=>setTf(p=>({…p,calories:v}))} sx={{marginBottom:0}}/>
<Inp label=“Protein (g)” type=“number” value={tf.protein||’’} onChange={v=>setTf(p=>({…p,protein:v}))} sx={{marginBottom:0}}/>
<Inp label=“Carbs (g)” type=“number” value={tf.carbs||’’} onChange={v=>setTf(p=>({…p,carbs:v}))} sx={{marginBottom:0}}/>
<Inp label=“Fat (g)” type=“number” value={tf.fat||’’} onChange={v=>setTf(p=>({…p,fat:v}))} sx={{marginBottom:0}}/>
</div>
<Btn onClick={saveTgts} sm sx={{width:‘100%’,marginTop:10}}>Save Targets</Btn>
</>
):(
<div style={{display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:8}}>
{Object.entries(nutr).map(([k,v])=><div key={k} style={{background:G.s2,borderRadius:10,padding:‘10px 12px’}}><div style={{fontFamily:”‘Bebas Neue’”,fontSize:22,color:G.pL,lineHeight:1}}>{v}</div><div style={{fontSize:9,color:G.w40,textTransform:‘uppercase’,letterSpacing:1,fontWeight:600}}>{k}</div></div>)}
</div>
)}
</Card>
<Card sx={{padding:14}}>
<div style={{fontSize:10,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:700,marginBottom:10}}>Today’s Meals</div>
{meals.length===0?<div style={{color:G.w40,fontSize:12}}>Client hasn’t logged meals today.</div>:
meals.map(m=>(
<div key={m.id} style={{display:‘flex’,justifyContent:‘space-between’,padding:‘8px 0’,borderBottom:`1px solid ${G.s2}`}}>
<div><div style={{fontWeight:700,fontSize:13}}>{m.name}</div>{m.items&&<div style={{fontSize:11,color:G.w40}}>{m.items}</div>}</div>
<div style={{textAlign:‘right’}}><div style={{fontFamily:”‘Bebas Neue’”,fontSize:20,color:G.pL}}>{m.calories}</div><div style={{fontSize:10,color:G.w40}}>P:{m.protein} C:{m.carbs} F:{m.fat}</div></div>
</div>
))}
</Card>
</div>}
{/* PROGRESS */}
{tab===‘progress’&&<div style={{display:‘flex’,flexDirection:‘column’,gap:10}}>
<Card sx={{padding:14}}>
<div style={{fontSize:10,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:700,marginBottom:12}}>Weight History</div>
{meas.length<2?<div style={{color:G.w40,fontSize:12,textAlign:‘center’,padding:‘10px 0’}}>Not enough data yet.</div>:(
<svg width=“100%” viewBox=“0 0 260 80” style={{overflow:‘visible’}}>
{meas.map((p,i)=>{const x=(i/Math.max(meas.length-1,1))*260,y=70-((p.weight-minW)/rng)*60;return(<g key={i}>{i>0&&(()=>{const pp=meas[i-1];const px=((i-1)/Math.max(meas.length-1,1))*260;const py=70-((pp.weight-minW)/rng)*60;return<line x1={px} y1={py} x2={x} y2={y} stroke={G.p} strokeWidth={2}/>;})()}<circle cx={x} cy={y} r={4} fill={G.p}/><text x={x} y={y-7} textAnchor="middle" fill={G.pL} fontSize={9}>{p.weight}</text><text x={x} y={78} textAnchor="middle" fill={G.w40} fontSize={8}>{p.date?.slice(5)}</text></g>);})}
</svg>
)}
</Card>
<Card sx={{padding:14}}>
<div style={{fontSize:10,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:700,marginBottom:10}}>Measurement Log</div>
{meas.length===0?<div style={{color:G.w40,fontSize:12}}>No entries yet.</div>:[…meas].reverse().map(e=><div key={e.id} style={{display:‘flex’,justifyContent:‘space-between’,padding:‘7px 0’,borderBottom:`1px solid ${G.s2}`}}><span style={{fontWeight:600,fontSize:12}}>{e.date}</span><span style={{color:G.pL,fontSize:12}}>{e.weight}kg{e.bodyFat?` · ${e.bodyFat}% BF`:’’}</span></div>)}
</Card>
</div>}
{/* CHAT */}
{tab===‘chat’&&<>
<div style={{display:‘flex’,flexDirection:‘column’,gap:8,minHeight:200,marginBottom:12}}>
{msgs.map(m=>{const me=m.from===user.id;return(
<div key={m.id} style={{display:‘flex’,flexDirection:‘column’,alignItems:me?‘flex-end’:‘flex-start’}}>
<div style={{maxWidth:‘85%’,padding:‘10px 13px’,borderRadius:14,borderBottomRightRadius:me?3:14,borderBottomLeftRadius:me?14:3,background:me?`linear-gradient(135deg,${G.pD},${G.p})`:G.s2,border:me?‘none’:`1px solid ${G.s3}`,color:me?G.bg:G.white,fontWeight:me?600:400,fontSize:13,lineHeight:1.5}}>{m.text}</div>
</div>
);})}
</div>
<div style={{display:‘flex’,gap:8}}>
<input value={chatText} onChange={e=>setChatText(e.target.value)} onKeyDown={e=>e.key===‘Enter’&&sendMsg()} placeholder={`Message ${client.name}…`} style={{flex:1,background:G.s2,border:`1.5px solid ${G.s3}`,borderRadius:22,padding:‘11px 15px’,fontSize:13,color:G.white}}/>
<button onClick={sendMsg} style={{width:40,height:40,borderRadius:‘50%’,background:`linear-gradient(135deg,${G.pD},${G.p})`,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:15,flexShrink:0}}>➤</button>
</div>
</>}
</div>
{/* Assign modal */}
{showAssign&&(
<div style={{position:‘fixed’,inset:0,background:‘rgba(0,0,0,.85)’,zIndex:99,display:‘flex’,alignItems:‘flex-end’}}>
<div style={{width:‘100%’,maxWidth:430,margin:‘0 auto’,background:G.s1,borderRadius:‘18px 18px 0 0’,border:`1px solid ${G.pBorder}`,padding:24,maxHeight:‘70vh’,overflowY:‘auto’}}>
<div style={{fontWeight:700,fontSize:17,marginBottom:14}}>Assign Programme</div>
{allProgs.length===0?<div style={{color:G.w40,textAlign:‘center’,padding:20}}>No programmes yet. Create one in Plans tab.</div>:
allProgs.map(p=>{const assigned=(p.assignedTo||[]).includes(client.id);return(
<div key={p.id} onClick={()=>!assigned&&assignProg(p.id)} style={{display:‘flex’,gap:12,alignItems:‘center’,padding:‘12px 0’,borderBottom:`1px solid ${G.s3}`,cursor:assigned?‘default’:‘pointer’,opacity:assigned?.5:1}}>
<span style={{fontSize:22}}>{p.emoji}</span>
<div style={{flex:1}}><div style={{fontWeight:700}}>{p.name}</div><div style={{fontSize:12,color:G.w40}}>{p.weeks}w · {p.category}</div></div>
{assigned&&<Pill>Assigned</Pill>}
</div>
);})}
<button onClick={()=>setShowAssign(false)} style={{width:‘100%’,marginTop:14,padding:13,borderRadius:10,background:G.s3,fontWeight:700,color:G.w70}}>Close</button>
</div>
</div>
)}
</div>
);
};

/* ── COACH SCREENS ────────────────────────────────────────── */
const CoachHome=({user})=>{
const[clients,setClients]=useState([]);
const[progs,setProgs]=useState([]);
useEffect(()=>{const u1=api.watchClients(user.id,setClients);const u2=api.watchProgs(user.id,setProgs);return()=>{u1();u2();};},[user.id]);
return(
<div style={{paddingBottom:20}}>
<div style={{padding:‘22px 20px 20px’,background:`linear-gradient(160deg,${G.s2},${G.bg})`,position:‘relative’,overflow:‘hidden’}}>
<div style={{position:‘absolute’,top:-40,right:-30,width:150,height:150,background:‘radial-gradient(circle,rgba(201,168,76,.08),transparent 70%)’,pointerEvents:‘none’}}/>
<div className=“fu” style={{fontSize:11,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:600}}>Welcome,</div>
<div className=“fu d1” style={{fontFamily:”‘Bebas Neue’”,fontSize:34,letterSpacing:2,lineHeight:1.1}}>{user.name.split(’ ‘)[0].toUpperCase()}</div>
<div className="fu d2" style={{fontSize:12,color:G.w70,marginTop:4}}>LEVELUP Coach Dashboard</div>
</div>
<div className=“fu d2” style={{display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:10,padding:‘13px 20px’}}>
{[{v:clients.length,l:‘Active Clients’},{v:progs.length,l:‘Programmes’}].map(s=>(
<Card key={s.l} sx={{padding:‘15px 13px’}}>
<div style={{fontFamily:”‘Bebas Neue’”,fontSize:38,color:G.pL,lineHeight:1}}>{s.v}</div>
<div style={{fontSize:10,color:G.w40,letterSpacing:1.5,textTransform:‘uppercase’,fontWeight:700,marginTop:2}}>{s.l}</div>
</Card>
))}
</div>
<SH>Share LEVELUP</SH>
<div style={{padding:‘0 20px’}}>
<Card sx={{padding:15}}>
<div style={{fontSize:13,color:G.w70,lineHeight:1.6,marginBottom:10}}>Share this link — clients sign up and automatically connect to you.</div>
<div style={{background:G.s2,padding:‘10px 12px’,borderRadius:8,fontSize:11,color:G.pL,fontFamily:‘monospace’,wordBreak:‘break-all’,marginBottom:10}}>{window.location.href.split(’#’)[0].split(’?’)[0]}</div>
<Pill c={G.green} sx={{fontSize:10}}>Free for all clients</Pill>
</Card>
</div>
</div>
);
};
const CoachClients=({user})=>{
const[clients,setClients]=useState([]);
const[progs,setProgs]=useState([]);
const[sel,setSel]=useState(null);
useEffect(()=>{const u1=api.watchClients(user.id,setClients);const u2=api.watchProgs(user.id,setProgs);return()=>{u1();u2();};},[user.id]);
if(sel)return<ClientDetail user={user} client={sel} allProgs={progs} onBack={()=>setSel(null)}/>;
return(
<div style={{paddingBottom:20}}>
<SH>All Clients</SH>
<div style={{padding:‘0 20px’,display:‘flex’,flexDirection:‘column’,gap:8}}>
{clients.length===0?<Empty icon="👥" title="No clients yet" sub="Clients appear here when they sign up with your link."/>:
clients.map(c=>(
<Card key={c.id} onClick={()=>setSel(c)} sx={{padding:14,display:‘flex’,gap:12,alignItems:‘center’}}>
<Av name={c.name} size={44}/>
<div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{fontSize:11,color:G.w40,marginTop:2}}>{c.email}</div></div>
<span style={{color:G.w40,fontSize:16}}>›</span>
</Card>
))}
</div>
</div>
);
};
const CoachPlans=({user})=>{
const[progs,setProgs]=useState([]);
const[editing,setEditing]=useState(null);
const[creating,setCreating]=useState(false);
useEffect(()=>{const u=api.watchProgs(user.id,setProgs);return u;},[user.id]);
if(editing)return<ProgEditor user={user} programme={editing} onBack={()=>setEditing(null)}/>;
if(creating)return<ProgEditor user={user} programme={null} onBack={()=>setCreating(false)}/>;
return(
<div style={{paddingBottom:20}}>
<SH action=”+ Create” onAction={()=>setCreating(true)}>Programmes</SH>
<div style={{padding:‘0 20px’,display:‘flex’,flexDirection:‘column’,gap:10}}>
{progs.length===0?<Empty icon="📋" title="No programmes yet" sub="Create your first training programme."/>:
progs.map(p=>(
<Card key={p.id} onClick={()=>setEditing(p)} sx={{padding:15,display:‘flex’,gap:12,alignItems:‘flex-start’}}>
<div style={{width:46,height:46,borderRadius:12,background:G.s3,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:22,flexShrink:0}}>{p.emoji||‘🏋️’}</div>
<div style={{flex:1}}>
<div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{p.name}</div>
<div style={{fontSize:12,color:G.w40,marginBottom:5}}>{p.weeks}w · {p.category} · {(p.workouts||[]).length} workouts</div>
{p.description&&<div style={{fontSize:12,color:G.w70,lineHeight:1.5}}>{p.description}</div>}
<div style={{marginTop:7}}><Pill sx={{fontSize:9}}>{(p.assignedTo||[]).length} clients</Pill></div>
</div>
<span style={{color:G.w40,fontSize:16}}>›</span>
</Card>
))}
</div>
</div>
);
};
const CoachMessages=({user})=>{
const[clients,setClients]=useState([]);
const[sel,setSel]=useState(null);
const[msgs,setMsgs]=useState([]);
const[text,setText]=useState(’’);
useEffect(()=>{const u=api.watchClients(user.id,setClients);return u;},[user.id]);
useEffect(()=>{if(!sel)return;const u=api.watchMsgs(user.id,sel.id,setMsgs);return u;},[sel,user.id]);
const send=async()=>{if(!text.trim()||!sel)return;await api.sendMsg(user.id,sel.id,text.trim());setText(’’);};
if(sel)return(
<div style={{display:‘flex’,flexDirection:‘column’,height:‘100%’}}>
<div style={{padding:‘13px 20px’,background:G.s1,borderBottom:`1px solid ${G.s3}`,display:‘flex’,alignItems:‘center’,gap:12,flexShrink:0}}>
<button onClick={()=>setSel(null)} style={{fontSize:22,color:G.w40}}>‹</button>
<Av name={sel.name} size={34}/><div style={{fontWeight:700,fontSize:14}}>{sel.name}</div>
</div>
<div style={{flex:1,overflowY:‘auto’,padding:‘13px 20px’,display:‘flex’,flexDirection:‘column’,gap:8}}>
{msgs.map(m=>{const me=m.from===user.id;return(
<div key={m.id} style={{display:‘flex’,flexDirection:‘column’,alignItems:me?‘flex-end’:‘flex-start’}}>
<div style={{maxWidth:‘82%’,padding:‘10px 13px’,borderRadius:14,borderBottomRightRadius:me?3:14,borderBottomLeftRadius:me?14:3,background:me?`linear-gradient(135deg,${G.pD},${G.p})`:G.s2,border:me?‘none’:`1px solid ${G.s3}`,color:me?G.bg:G.white,fontWeight:me?600:400,fontSize:13,lineHeight:1.5}}>{m.text}</div>
</div>
);})}
</div>
<div style={{display:‘flex’,gap:9,padding:‘10px 20px’,borderTop:`1px solid ${G.s3}`,flexShrink:0}}>
<input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key===‘Enter’&&send()} placeholder={`Message ${sel.name}…`} style={{flex:1,background:G.s2,border:`1.5px solid ${G.s3}`,borderRadius:22,padding:‘11px 15px’,fontSize:13,color:G.white}}/>
<button onClick={send} style={{width:40,height:40,borderRadius:‘50%’,background:`linear-gradient(135deg,${G.pD},${G.p})`,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontSize:15,flexShrink:0}}>➤</button>
</div>
</div>
);
return(
<div style={{paddingBottom:20}}>
<SH>Messages</SH>
<div style={{padding:‘0 20px’,display:‘flex’,flexDirection:‘column’,gap:8}}>
{clients.length===0?<Empty icon="💬" title="No clients yet" sub="Clients will appear here when they sign up."/>:
clients.map(c=>(
<Card key={c.id} onClick={()=>setSel(c)} sx={{padding:14,display:‘flex’,gap:12,alignItems:‘center’}}>
<Av name={c.name} size={42}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{c.name}</div><div style={{fontSize:12,color:G.w40,marginTop:2}}>{c.email}</div></div>
<span style={{color:G.w40,fontSize:16}}>›</span>
</Card>
))}
</div>
</div>
);
};
const CoachApp=({user,logout})=>{
const[tab,setTab]=useState(‘home’);
const tabs=[{id:‘home’,icon:‘📊’,label:‘Home’},{id:‘clients’,icon:‘👥’,label:‘Clients’},{id:‘plans’,icon:‘📋’,label:‘Plans’},{id:‘messages’,icon:‘💬’,label:‘Messages’}];
const sc={home:<CoachHome user={user}/>,clients:<CoachClients user={user}/>,plans:<CoachPlans user={user}/>,messages:<CoachMessages user={user}/>};
return<Shell user={user} logout={logout} tabs={tabs} active={tab} setTab={setTab}>{sc[tab]}</Shell>;
};

/* ── ROOT ─────────────────────────────────────────────────── */
const App=()=>{
const[user,setUser]=useState(null);
const[loading,setLoading]=useState(true);
useEffect(()=>{
if(!window.**FB**){setLoading(false);return;}
const u=api.watchAuth(async fb=>{
if(fb){const p=await api.getUser(fb.uid);setUser(p);}
else setUser(null);
setLoading(false);
});
return u;
},[]);
const logout=async()=>{if(confirm(‘Sign out?’))await api.signOut();};
if(!window.**FB**)return<Setup/>;
if(loading)return<div style={{position:‘fixed’,inset:0,background:’#080810’,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,justifyContent:‘center’,gap:14}}><div className="spin"/><div style={{fontFamily:”‘Bebas Neue’”,fontSize:32,letterSpacing:6,background:‘linear-gradient(135deg,#8B6914,#E8C97A)’,WebkitBackgroundClip:‘text’,WebkitTextFillColor:‘transparent’}}>LEVELUP</div></div>;
if(!user)return<Auth/>;
if(user.role===‘coach’)return<CoachApp user={user} logout={logout}/>;
return<ClientApp user={user} logout={logout}/>;
};
ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
</script>

</body>
</html>
